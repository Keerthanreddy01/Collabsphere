name: CI - Lint, TypeCheck, Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: ESLint Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [web, mobile]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run ESLint on ${{ matrix.app }} app
        run: cd apps/${{ matrix.app }} && npm run lint
        continue-on-error: false

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run TypeScript compiler
        run: tsc --noEmit

  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: cd apps/web && npm run build
        env:
          # Optional: Set to skip telemetry
          NEXT_TELEMETRY_DISABLED: 1

      - name: Check build output
        run: test -d apps/web/.next
